<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>photo analysis</title>
<link rel="stylesheet" href="styles.css">

<style>
body.dark-mode {
    background:#111;
    color:#e9e9e9;
}

.analysis-wrap {
    width:100%;
    max-width:900px;
    display:flex;
    flex-direction:column;
    gap:25px;
}

.analysis-card {
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

body.dark-mode .analysis-card {
    background:#1b1b1b;
}

.analysis-title {
    font-size:1.1rem;
    margin-bottom:10px;
}

.analysis-big {
    font-size:1.8rem;
    font-weight:bold;
}

.analysis-list {
    display:flex;
    flex-direction:column;
    gap:8px;
    font-size:0.9rem;
}

.topbar {
    width:100%;
    display:flex;
    justify-content:flex-end;
    margin-bottom:15px;
}

.top-btn {
    background:#333;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:999px;
    cursor:pointer;
}

body.dark-mode .top-btn {
    background:#eee;
    color:#111;
}
</style>
</head>

<body>

<div class="container">
    <div class="profile">
        <img src="images/KakaoTalk_20240406_232152395.jpg" class="profile-img">
        <h2>Hamihamoo</h2>
        <p>Amateur Photographer</p>

        <nav>
            <ul>
                <li><a href="index.html">main page</a></li>
                <li><a href="digital.html">digital photos</a></li>
                <li><a href="film.html">film photos</a></li>
                <li><a href="guestbook.html">guestbook</a></li>
                <li><a href="colors.html">colors archive</a></li>
                <li><a href="analysis.html">analysis</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">

        <div class="topbar">
            <button class="top-btn" onclick="toggleDark()">🌙 Dark</button>
        </div>

        <h1>photo analysis</h1>

        <div class="analysis-wrap" id="analysis"></div>

    </div>
</div>

<script>

let photos = [];

function toggleDark(){
    document.body.classList.toggle("dark-mode");
    localStorage.setItem("dark", document.body.classList.contains("dark-mode"));
}

if(localStorage.getItem("dark")==="true"){
    document.body.classList.add("dark-mode");
}

fetch("photos.json")
.then(res=>res.json())
.then(data=>{
    photos=data;
    runAnalysis();
});

function runAnalysis(){

    const total = photos.length;

    let apertureCount = {};
    let isoCount = {};
    let colorCount = {};
    let monthCount = {};

    photos.forEach(p=>{
        const info = p.info || "";

        const f = info.match(/f\d+(\.\d+)?/i);
        const iso = info.match(/iso\s*\d+/i);

        if(f){
            apertureCount[f[0]] = (apertureCount[f[0]]||0)+1;
        }

        if(iso){
            isoCount[iso[0]] = (isoCount[iso[0]]||0)+1;
        }

        const color = p.color || "Gray";
        colorCount[color] = (colorCount[color]||0)+1;

        if(p.date){
            const month = p.date.substring(0,7);
            monthCount[month] = (monthCount[month]||0)+1;
        }
    });

    function top3(obj){
        return Object.entries(obj)
            .sort((a,b)=>b[1]-a[1])
            .slice(0,3);
    }

    const wrap = document.getElementById("analysis");

    wrap.innerHTML = `
    <div class="analysis-card">
        <div class="analysis-title">Total Photos</div>
        <div class="analysis-big">${total}</div>
    </div>

    <div class="analysis-card">
        <div class="analysis-title">Top Aperture</div>
        <div class="analysis-list">
            ${top3(apertureCount).map(v=>`${v[0]} (${v[1]})`).join("<br>")}
        </div>
    </div>

    <div class="analysis-card">
        <div class="analysis-title">Top ISO</div>
        <div class="analysis-list">
            ${top3(isoCount).map(v=>`${v[0]} (${v[1]})`).join("<br>")}
        </div>
    </div>

    <div class="analysis-card">
        <div class="analysis-title">Color Distribution</div>
        <div class="analysis-list">
            ${Object.entries(colorCount).map(v=>`${v[0]} (${v[1]})`).join("<br>")}
        </div>
    </div>

    <div class="analysis-card">
        <div class="analysis-title">Monthly Shooting</div>
        <div class="analysis-list">
            ${Object.entries(monthCount).map(v=>`${v[0]} (${v[1]})`).join("<br>")}
        </div>
    </div>
    `;
}

</script>

</body>
</html>
