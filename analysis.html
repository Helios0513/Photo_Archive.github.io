<script>
function runAnalysis() {
    const total = photos.length;

    let apertureCount = {};
    let isoCount = {};
    let colorCount = {};
    let monthCount = {};
    let shutterCount = { Fast: 0, Medium: 0, Slow: 0, Unknown: 0 };

    photos.forEach(p => {
        const info = p.info || "";

        const f = info.match(/f\d+(\.\d+)?/i);
        const iso = info.match(/iso\s*\d+/i);

        if (f) apertureCount[f[0]] = (apertureCount[f[0]] || 0) + 1;
        if (iso) isoCount[iso[0].replace(/\s+/g, " ")] = (isoCount[iso[0].replace(/\s+/g, " ")] || 0) + 1;

        const color = p.color || "Gray";
        colorCount[color] = (colorCount[color] || 0) + 1;

        if (p.date) {
            const month = p.date.substring(0, 7);
            monthCount[month] = (monthCount[month] || 0) + 1;
        }

        const shutterSeconds = parseShutter(info);
        const shutterCategory = getShutterCategory(shutterSeconds);
        shutterCount[shutterCategory]++;
    });

    const topApertures = topN(apertureCount, 5);
    const topIsos = topN(isoCount, 5);
    const topColors = topN(colorCount, 5);
    const topMonths = sortEntries(monthCount);

    const mainAperture = topApertures[0]?.[0] || "-";
    const mainIso = topIsos[0]?.[0] || "-";
    const mainColor = topColors[0]?.[0] || "-";
    const secondColor = topColors[1]?.[0] || "";
    const busiestMonth = topMonths[0]?.[0] || "-";

    // 🔥 셔터 비율 계산
    const totalShutter = shutterCount.Fast + shutterCount.Medium + shutterCount.Slow;
    const fastRatio = shutterCount.Fast / totalShutter;
    const slowRatio = shutterCount.Slow / totalShutter;

    let shootingStyleText = "";
    if (fastRatio > 0.55) {
        shootingStyleText = "빠른 셔터 사용 비중이 높아 순간 포착이나 움직임 제어에 집중하는 촬영 경향이 뚜렷하게 나타납니다.";
    } else if (slowRatio > 0.4) {
        shootingStyleText = "느린 셔터 활용이 비교적 많아 빛의 흐름과 분위기를 살리는 장면 중심의 촬영 경향이 보입니다.";
    } else {
        shootingStyleText = "셔터스피드 사용이 특정 영역에 치우치지 않고 상황에 따라 유연하게 대응하는 촬영 방식이 특징입니다.";
    }

    // 🔥 색 분석 (상위 2개 기반)
    let colorStyleText = "";
    if (["Black","Gray","Brown"].includes(mainColor)) {
        colorStyleText = "어두운 계열 색감이 중심을 이루며 전체적으로 차분하고 절제된 분위기의 사진이 주를 이룹니다.";
    } else if (["Blue","Green"].includes(mainColor)) {
        colorStyleText = "차가운 색 계열이 두드러지며 공간감과 공기감이 강조된 장면이 자주 나타납니다.";
    } else {
        colorStyleText = "따뜻한 색감 비중이 높아 장면의 분위기와 감정을 강조하는 방향의 사진이 많습니다.";
    }

    // 🔥 요약 문장 업그레이드
    const summaryText = `
        이 아카이브에서 드러나는 촬영 경향을 보면, 주로 <strong>${mainAperture}</strong> 조리개와
        <strong>${mainIso}</strong> 감도 설정이 반복적으로 사용되고 있습니다.
        색감에서는 <strong>${mainColor}${secondColor ? " · " + secondColor : ""}</strong> 계열이 중심을 이루며,
        촬영은 <strong>${busiestMonth}</strong> 시기에 가장 활발하게 이루어진 것으로 나타납니다.
    `;

    const wrap = document.getElementById("analysis");

    wrap.innerHTML = `
        <section class="analysis-hero">
            <div class="analysis-summary-title">Overall Reading</div>
            <div class="analysis-summary-text">${summaryText}</div>
        </section>

        <!-- 기존 구조 그대로 유지 -->
        ${wrap.innerHTML.split('<section class="analysis-grid">')[1] ? '<section class="analysis-grid">' + wrap.innerHTML.split('<section class="analysis-grid">')[1] : ''}
    `;

    // 🔥 마지막 interpretation만 교체
    document.querySelector(".analysis-section:last-child .section-description")
        .innerText = "이 아카이브에서 드러나는 촬영 스타일과 색감 경향을 정리했습니다.";

    document.querySelector(".insight-card:nth-child(1) .insight-text").innerText = shootingStyleText;
    document.querySelector(".insight-card:nth-child(2) .insight-text").innerText = colorStyleText;
}
</script>
