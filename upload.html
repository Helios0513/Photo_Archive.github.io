<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사진 통합 관리 시스템 (다중 업로드 및 일괄 복구)</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .upload-box { max-width: 600px; margin: 30px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; font-family: sans-serif; background: white; }
        input, button, textarea, select { width: 100%; margin-bottom: 10px; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        label { font-size: 0.85rem; color: #555; margin-bottom: 5px; display: block; font-weight: bold; }
        button { background-color: #333; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #555; }
        #status { color: blue; font-weight: bold; text-align: center; margin-top: 10px; white-space: pre-wrap; font-size: 0.9rem; }
        
        .manage-section { max-width: 600px; margin: 50px auto; font-family: sans-serif; }
        
        .batch-tool-box { 
            background: #fff4e5; padding: 15px; border: 2px solid #ff9800; 
            border-radius: 10px; margin-bottom: 20px; display: none;
        }
        .batch-tool-box h3 { margin-top: 0; font-size: 1rem; color: #e65100; }
        .magic-btn { background-color: #ff9800; margin-top: 5px; }
        .save-all-btn { background-color: #28a745; margin-top: 10px; }

        .photo-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 15px; background: #fff; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        .photo-item img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; background: #f9f9f9; }
        .photo-info-edit { flex-grow: 1; }
        .photo-info-edit input, .photo-info-edit select { margin-bottom: 5px; padding: 8px; font-size: 0.85rem; width: 100%; }
        .delete-btn { background-color: #dc3545; width: auto; padding: 6px 12px; font-size: 0.75rem; }
        .refresh-btn { background-color: #007bff; margin-bottom: 10px; }

        @media (max-width: 768px) {
            .photo-item { align-items: flex-start; }
            .photo-item img { width: 70px; height: 52px; }
        }
    </style>
</head>
<body>
    <div class="upload-box">
        <h2>📷 사진 올리기 (다중 선택 가능)</h2>
        <input type="password" id="token" placeholder="깃허브 토큰 입력">
        
        <label>📷 사진 선택 (여러 장 가능)</label>
        <input type="file" id="fileInput" accept="image/*" multiple>
        
        <p class="info-msg" style="font-size: 0.8rem; color: #666; text-align: center;">
            ※ 여러 장 업로드 시, 각 사진의 메타데이터 날짜로 자동 저장됩니다.
        </p>
        
        <button onclick="handleUpload()">업로드 시작</button>
        <div id="status"></div>
    </div>

    <div class="manage-section">
        <h2>📂 기존 사진 관리 및 복구</h2>
        <button class="refresh-btn" onclick="loadPhotoList()">🔄 목록 불러오기</button>
        
        <div id="batchTool" class="batch-tool-box">
            <h3>🛠 일괄 날짜 복구 도구</h3>
            <p style="font-size: 0.8rem; color: #666;">
                날짜가 없는 기존 사진들의 메타데이터를 분석하여 자동으로 날짜를 채웁니다.
            </p>
            <button class="magic-btn" onclick="autoFillDates()">🪄 기존 사진 날짜 일괄 추출하기</button>
            <button class="magic-btn" onclick="normalizeMetadata()">🪄 기존 사진 메타데이터 일괄 정리하기</button>
            <button class="magic-btn" onclick="autoFillColors()">🪄 기존 사진 색상 일괄 분류하기</button>
            <button class="save-all-btn" onclick="saveAllChanges()">✅ 변경된 모든 내용 저장하기</button>
        </div>

        <div id="photoList">
            <p style="text-align: center; color: #999;">토큰 입력 후 목록을 불러오세요.</p>
        </div>
    </div>

    <script>
        const repo = "Helios0513/Photo_Archive.github.io";

        const COLOR_OPTIONS = [
            "Black",
            "White",
            "Gray",
            "Brown",
            "Red",
            "Orange",
            "Yellow",
            "Green",
            "Blue",
            "Purple",
            "Pink"
        ];

        function createColorSelect(selectedValue = "") {
            const normalizedSelected = COLOR_OPTIONS.includes(selectedValue) ? selectedValue : "";
            let optionsHtml = `<option value="">색상 선택</option>`;
            optionsHtml += COLOR_OPTIONS.map(color => {
                const selected = color === normalizedSelected ? "selected" : "";
                return `<option value="${color}" ${selected}>${color}</option>`;
            }).join("");
            return `<select class="edit-color">${optionsHtml}</select>`;
        }

        function formatExposureTime(exposureValue) {
            if (!exposureValue) return "";

            if (typeof exposureValue === "string") {
                const trimmed = exposureValue.trim();
                if (!trimmed) return "";
                return trimmed.endsWith("s") ? trimmed : `${trimmed}s`;
            }

            if (typeof exposureValue === "number") {
                if (exposureValue >= 1) {
                    return `${exposureValue}s`;
                }
                const denominator = Math.round(1 / exposureValue);
                if (denominator > 0) {
                    return `1/${denominator}s`;
                }
                return `${exposureValue}s`;
            }

            if (typeof exposureValue === "object") {
                if (
                    typeof exposureValue.numerator === "number" &&
                    typeof exposureValue.denominator === "number" &&
                    exposureValue.denominator !== 0
                ) {
                    if (exposureValue.numerator >= exposureValue.denominator) {
                        const seconds = exposureValue.numerator / exposureValue.denominator;
                        return `${seconds}s`;
                    }
                    return `${exposureValue.numerator}/${exposureValue.denominator}s`;
                }

                if (
                    typeof exposureValue.numerator === "function" &&
                    typeof exposureValue.denominator === "function"
                ) {
                    const numerator = exposureValue.numerator();
                    const denominator = exposureValue.denominator();
                    if (denominator) {
                        if (numerator >= denominator) {
                            const seconds = numerator / denominator;
                            return `${seconds}s`;
                        }
                        return `${numerator}/${denominator}s`;
                    }
                }

                if (typeof exposureValue.toString === "function") {
                    const text = exposureValue.toString().trim();
                    if (!text) return "";
                    return text.endsWith("s") ? text : `${text}s`;
                }
            }

            return "";
        }

        function extractMetadataParts(infoText) {
            const text = (infoText || "").replace(/,/g, " ").replace(/\s+/g, " ").trim();

            const fMatch = text.match(/\bf\d+(\.\d+)?\b/i);
            const shutterMatch = text.match(/\b\d+\/\d+s\b|\b\d+(\.\d+)?s\b/i);
            const isoMatch = text.match(/\biso\s*\d+\b/i);

            const fPart = fMatch ? fMatch[0] : "";
            const shutterPart = shutterMatch ? shutterMatch[0] : "";
            const isoPart = isoMatch ? isoMatch[0].replace(/\s+/g, " ") : "";

            let cameraPart = text;
            if (fMatch) {
                cameraPart = text.substring(0, fMatch.index).trim();
            }

            cameraPart = cameraPart
                .replace(/\bNikkor\b.*$/i, "")
                .replace(/\bNIKKOR\b.*$/i, "")
                .replace(/\s+/g, " ")
                .trim();

            return {
                cameraPart,
                fPart,
                shutterPart,
                isoPart
            };
        }

        async function getExposureFromImage(fileName) {
            const imgUrl = `images/digital/${fileName}`;
            try {
                const response = await fetch(imgUrl, { cache: "no-store" });
                if (!response.ok) return "";
                const blob = await response.blob();

                return await new Promise((resolve) => {
                    EXIF.getData(blob, function() {
                        const exposureRaw = EXIF.getTag(this, "ExposureTime");
                        resolve(formatExposureTime(exposureRaw));
                    });
                });
            } catch (error) {
                return "";
            }
        }

        function buildNormalizedInfo(cameraPart, fPart, shutterPart, isoPart) {
            return [cameraPart, fPart, shutterPart, isoPart]
                .filter(value => value && String(value).trim() !== "")
                .join(" ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function rgbToHsv(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const diff = max - min;

            let h = 0;
            const s = max === 0 ? 0 : diff / max;
            const v = max;

            if (diff !== 0) {
                switch (max) {
                    case r:
                        h = ((g - b) / diff) % 6;
                        break;
                    case g:
                        h = (b - r) / diff + 2;
                        break;
                    case b:
                        h = (r - g) / diff + 4;
                        break;
                }
                h *= 60;
                if (h < 0) h += 360;
            }

            return {
                h,
                s: s * 100,
                v: v * 100
            };
        }

        function classifyPixelColor(r, g, b) {
            const { h, s, v } = rgbToHsv(r, g, b);

            if (v < 18) return "Black";
            if (v > 94 && s < 10) return "White";
            if (s < 16) return "Gray";

            if ((h >= 0 && h < 12) || (h >= 345 && h <= 360)) return "Red";
            if (h >= 12 && h < 30) return "Orange";
            if (h >= 30 && h < 65) return "Yellow";
            if (h >= 65 && h < 170) return "Green";
            if (h >= 170 && h < 255) return "Blue";
            if (h >= 255 && h < 320) return "Purple";
            if (h >= 320 && h < 345) return "Pink";

            return "Gray";
        }

        function getWeightedColorScore(colorName, hsv, x, y, centerX, centerY) {
            const distance = Math.sqrt((x - centerX) ** 2 + (y - centerY) ** 2);
            const maxDistance = Math.sqrt(centerX ** 2 + centerY ** 2) || 1;
            const centerWeight = 1.55 - (distance / maxDistance) * 0.75;
            const saturationBoost = 1 + (hsv.s / 100) * 1.25;
            const brightnessPenalty = (hsv.v < 10 || hsv.v > 97) ? 0.35 : 1;

            let colorBonus = 1;
            if (["Pink", "Purple", "Red", "Orange", "Yellow"].includes(colorName)) {
                colorBonus = 1.12;
            }

            return centerWeight * saturationBoost * brightnessPenalty * colorBonus;
        }

        function pickDominantColor(scores) {
            const entries = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            if (entries.length === 0) return "Gray";

            const [topColor, topScore] = entries[0];
            const secondScore = entries[1] ? entries[1][1] : 0;

            if (topColor === "Gray" && entries[1] && secondScore > topScore * 0.72) {
                return entries[1][0];
            }

            if (topColor === "White" && entries[1] && secondScore > topScore * 0.68) {
                return entries[1][0];
            }

            return topColor;
        }

        async function detectColorFromImageSource(source) {
            return await new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(source);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;

                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d", { willReadFrequently: true });
                        const size = 90;
                        canvas.width = size;
                        canvas.height = size;
                        ctx.drawImage(img, 0, 0, size, size);

                        const imageData = ctx.getImageData(0, 0, size, size).data;
                        const scores = {
                            Black: 0,
                            White: 0,
                            Gray: 0,
                            Brown: 0,
                            Red: 0,
                            Orange: 0,
                            Yellow: 0,
                            Green: 0,
                            Blue: 0,
                            Purple: 0,
                            Pink: 0
                        };

                        const startX = Math.floor(size * 0.15);
                        const endX = Math.floor(size * 0.85);
                        const startY = Math.floor(size * 0.15);
                        const endY = Math.floor(size * 0.85);
                        const centerX = size / 2;
                        const centerY = size / 2;

                        for (let y = startY; y < endY; y++) {
                            for (let x = startX; x < endX; x++) {
                                const i = (y * size + x) * 4;
                                const r = imageData[i];
                                const g = imageData[i + 1];
                                const b = imageData[i + 2];
                                const a = imageData[i + 3];

                                if (a < 20) continue;

                                const hsv = rgbToHsv(r, g, b);

                                let colorName = classifyPixelColor(r, g, b);

                                if (hsv.s >= 12 && hsv.v >= 45 && hsv.v <= 97) {
                                    if (r > 150 && g > 115 && b > 125 && r >= b && b >= g * 0.75) {
                                        colorName = "Pink";
                                    } else if (r > 110 && g > 80 && g < r && b < g * 0.85 && hsv.v < 70) {
                                        colorName = "Brown";
                                    }
                                }

                                const weight = getWeightedColorScore(colorName, hsv, x, y, centerX, centerY);
                                scores[colorName] += weight;
                            }
                        }

                        resolve(pickDominantColor(scores));
                    };

                    img.onerror = () => resolve("Gray");
                };

                reader.onerror = () => resolve("Gray");
            });
        }

        async function detectColorFromFile(file) {
            return await detectColorFromImageSource(file);
        }

        async function detectColorFromExistingImage(fileName) {
            const imgUrl = `images/digital/${fileName}`;
            try {
                const response = await fetch(imgUrl, { cache: "no-store" });
                if (!response.ok) return "";
                const blob = await response.blob();
                return await detectColorFromImageSource(blob);
            } catch (error) {
                return "";
            }
        }

        // [1] 목록 로드
        async function loadPhotoList() {
            const token = document.getElementById('token').value;
            if (!token) return alert("토큰을 입력해주세요!");
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/photos.json`, { 
                    headers: { "Authorization": `token ${token}` } 
                });
                const data = await res.json();
                window.allPhotos = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                document.getElementById('batchTool').style.display = 'block';
                renderList();
            } catch (e) { alert("로드 실패"); }
        }

        function renderList() {
            const listDiv = document.getElementById('photoList');
            listDiv.innerHTML = "";
            window.allPhotos.slice().reverse().forEach((p, index) => {
                const realIndex = window.allPhotos.length - 1 - index;
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.innerHTML = `
                    <img src="images/digital/${p.filename}" id="img-${realIndex}">
                    <div class="photo-info-edit">
                        <input type="date" class="edit-date" data-index="${realIndex}" value="${p.date || ''}">
                        <input type="text" class="edit-info" data-index="${realIndex}" value="${p.info || ''}">
                        ${createColorSelect(p.color || "")}
                        <small>${p.filename}</small>
                    </div>
                    <button class="delete-btn" onclick="deletePhoto(${realIndex}, '${p.filename}')">삭제</button>
                `;
                listDiv.appendChild(item);

                const colorSelect = item.querySelector('.edit-color');
                colorSelect.setAttribute('data-index', realIndex);
            });
        }

        // [2] 일괄 날짜 추출 기능
        async function autoFillDates() {
            const status = document.getElementById('status');
            const dateInputs = document.querySelectorAll('.edit-date');
            let count = 0;
            status.innerText = "⏳ 기존 사진 분석 시작...";
            for (let input of dateInputs) {
                if (!input.value) {
                    const idx = input.getAttribute('data-index');
                    const fileName = window.allPhotos[idx].filename;
                    const imgUrl = `images/digital/${fileName}`;
                    try {
                        const response = await fetch(imgUrl);
                        const blob = await response.blob();
                        await new Promise((resolve) => {
                            EXIF.getData(blob, function() {
                                const exifDate = EXIF.getTag(this, "DateTimeOriginal");
                                if (exifDate) {
                                    const parts = exifDate.split(" ")[0].split(":");
                                    input.value = `${parts[0]}-${parts[1]}-${parts[2]}`;
                                    input.style.border = "2px solid #ff9800";
                                    count++;
                                }
                                resolve();
                            });
                        });
                    } catch (err) { console.log(err); }
                }
            }
            status.innerText = `✅ 분석 완료! ${count}개의 날짜 복구. [저장하기]를 눌러주세요.`;
        }

        // [3] 기존 사진 메타데이터 일괄 정리 기능
        async function normalizeMetadata() {
            const status = document.getElementById('status');
            const infoInputs = document.querySelectorAll('.edit-info');
            let lensRemovedCount = 0;
            let shutterAddedCount = 0;
            let unchangedCount = 0;

            status.innerText = "⏳ 기존 사진 메타데이터 정리 시작...";

            for (let input of infoInputs) {
                const idx = input.getAttribute('data-index');
                const photo = window.allPhotos[idx];
                const originalInfo = photo.info || "";

                const originalParts = extractMetadataParts(originalInfo);

                const hadLensText = /\bNikkor\b/i.test(originalInfo);
                let shutterPart = originalParts.shutterPart;

                if (!shutterPart) {
                    const exifShutter = await getExposureFromImage(photo.filename);
                    if (exifShutter) {
                        shutterPart = exifShutter;
                        shutterAddedCount++;
                    }
                }

                const normalizedInfo = buildNormalizedInfo(
                    originalParts.cameraPart,
                    originalParts.fPart,
                    shutterPart,
                    originalParts.isoPart
                );

                if (hadLensText) {
                    lensRemovedCount++;
                }

                if (normalizedInfo && normalizedInfo !== originalInfo.trim()) {
                    input.value = normalizedInfo;
                    input.style.border = "2px solid #ff9800";
                } else {
                    unchangedCount++;
                }
            }

            status.innerText = `✅ 메타데이터 정리 완료!
렌즈 이름 제거 처리: ${lensRemovedCount}개
셔터스피드 추가 성공: ${shutterAddedCount}개
변경 없음: ${unchangedCount}개
[저장하기]를 눌러주세요.`;
        }

        // [4] 기존 사진 색상 일괄 분류 기능
        async function autoFillColors() {
            const status = document.getElementById('status');
            const colorInputs = document.querySelectorAll('.edit-color');
            let count = 0;
            let unchangedCount = 0;

            status.innerText = "⏳ 기존 사진 색상 분류 시작...";

            for (let input of colorInputs) {
                const idx = input.getAttribute('data-index');
                const fileName = window.allPhotos[idx].filename;
                const detectedColor = await detectColorFromExistingImage(fileName);

                if (detectedColor && input.value !== detectedColor) {
                    input.value = detectedColor;
                    input.style.border = "2px solid #ff9800";
                    count++;
                } else {
                    unchangedCount++;
                }
            }

            status.innerText = `✅ 색상 분류 완료!
색상 적용: ${count}개
변경 없음: ${unchangedCount}개
[저장하기]를 눌러주세요.`;
        }

        // [5] 다중 파일 업로드 로직
        async function handleUpload() {
            const token = document.getElementById('token').value;
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const files = fileInput.files;

            if (!token || files.length === 0) return alert("토큰과 파일을 선택해주세요!");

            status.innerText = `⏳ 총 ${files.length}장의 사진 업로드 준비 중...`;

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/photos.json`, { 
                    headers: { "Authorization": `token ${token}` } 
                });
                const fileData = await res.json();
                let photos = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    status.innerText = `📤 업로드 중 (${i + 1}/${files.length}): ${file.name}`;

                    const detectedColor = await detectColorFromFile(file);

                    const exifData = await new Promise(resolve => {
                        EXIF.getData(file, function() {
                            const date = EXIF.getTag(this, "DateTimeOriginal");
                            const model = EXIF.getTag(this, "Model") || "";
                            const fNumberRaw = EXIF.getTag(this, "FNumber");
                            const isoRaw = EXIF.getTag(this, "ISOSpeedRatings");
                            const exposureRaw = EXIF.getTag(this, "ExposureTime");

                            const fNum = fNumberRaw ? `f${fNumberRaw}` : "";
                            const shutter = formatExposureTime(exposureRaw);
                            const iso = isoRaw ? `iso ${isoRaw}` : "";

                            let formattedDate = new Date().toISOString().substring(0, 10);
                            if (date) {
                                const p = date.split(" ")[0].split(":");
                                formattedDate = `${p[0]}-${p[1]}-${p[2]}`;
                            }

                            const info = [model, fNum, shutter, iso]
                                .filter(value => value && String(value).trim() !== "")
                                .join(" ");

                            resolve({ date: formattedDate, info: info });
                        });
                    });

                    const optimizedBlob = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = (e) => {
                            const img = new Image();
                            img.src = e.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                let w = img.width, h = img.height;
                                if (w > 1920) { h = (1920 * h) / w; w = 1920; }
                                canvas.width = w; canvas.height = h;
                                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.85);
                            };
                        };
                    });

                    const base64Content = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.readAsDataURL(optimizedBlob);
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                    });

                    const fileName = file.name.replace(/\.[^/.]+$/, "") + "_" + Date.now() + ".jpg";
                    await fetch(`https://api.github.com/repos/${repo}/contents/images/digital/${fileName}`, {
                        method: "PUT",
                        headers: { "Authorization": `token ${token}` },
                        body: JSON.stringify({ message: `Upload: ${fileName}`, content: base64Content })
                    });

                    photos.push({
                        filename: fileName,
                        info: exifData.info,
                        date: exifData.date,
                        color: detectedColor || "Gray"
                    });
                }

                status.innerText = "💾 장부 업데이트 중...";
                await saveJson(token, `Batch upload ${files.length} photos`, photos);
                
                status.innerText = `✅ 총 ${files.length}장 업로드 완료!`;
                fileInput.value = "";
                loadPhotoList();

            } catch (e) {
                status.innerText = "❌ 실패: " + e.message;
            }
        }

        // [6] 일괄 저장 및 삭제 (기존 유지)
        async function saveAllChanges() {
            const token = document.getElementById('token').value;
            const dateInputs = document.querySelectorAll('.edit-date');
            const infoInputs = document.querySelectorAll('.edit-info');
            const colorInputs = document.querySelectorAll('.edit-color');

            dateInputs.forEach(input => {
                const idx = input.getAttribute('data-index');
                window.allPhotos[idx].date = input.value;
            });

            infoInputs.forEach(input => {
                const idx = input.getAttribute('data-index');
                window.allPhotos[idx].info = input.value;
            });

            colorInputs.forEach(input => {
                const idx = input.getAttribute('data-index');
                window.allPhotos[idx].color = input.value;
            });

            try {
                await saveJson(token, "Batch update metadata", window.allPhotos);
                alert("저장 성공!");
                loadPhotoList();
            } catch(e) { alert("실패"); }
        }

        async function saveJson(token, msg, data) {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/photos.json`, { 
                headers: { "Authorization": `token ${token}` } 
            });
            const fileData = await res.json();
            await fetch(`https://api.github.com/repos/${repo}/contents/photos.json`, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: msg,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                    sha: fileData.sha
                })
            });
        }

        async function deletePhoto(index, fileName) {
            const token = document.getElementById('token').value;
            if(!confirm("삭제하시겠습니까?")) return;
            const photos = [...window.allPhotos];
            photos.splice(index, 1);
            try {
                await saveJson(token, `Delete ${fileName}`, photos);
                const fileRes = await fetch(`https://api.github.com/repos/${repo}/contents/images/digital/${fileName}`, { 
                    headers: { "Authorization": `token ${token}` } 
                });
                if (fileRes.ok) {
                    const fData = await fileRes.json();
                    await fetch(`https://api.github.com/repos/${repo}/contents/images/digital/${fileName}`, {
                        method: "DELETE",
                        headers: { "Authorization": `token ${token}` },
                        body: JSON.stringify({ message: `Delete file`, sha: fData.sha })
                    });
                }
                loadPhotoList();
            } catch(e) { alert("오류"); }
        }
    </script>
</body>
