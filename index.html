<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Archive</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 프로필 수정 모달 스타일 */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);
        }
        .modal-content {
            background-color: #fff; margin: 10% auto; padding: 25px;
            border-radius: 15px; width: 90%; max-width: 400px; font-family: sans-serif;
        }
        .modal-content h3 { margin-top: 0; color: #333; }
        .modal-content input, .modal-content textarea {
            width: 100%; margin-bottom: 15px; padding: 10px;
            box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px;
        }
        .modal-content button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; margin-bottom: 5px;
        }
        .btn-save { background-color: #333; color: white; }
        .btn-cancel { background-color: #eee; color: #666; }
        
        .profile-img, #displayName, #displayDescription { 
            cursor: pointer; 
            transition: opacity 0.3s; 
        }
        .profile-img:hover, #displayName:hover, #displayDescription:hover { 
            opacity: 0.7; 
        }

        /* 오늘의 사진 영역 */
        .today-photo-section {
            margin-top: 45px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .today-photo-title {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #333;
        }

        .today-photo-subtitle {
            color: #888;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .today-photo-card {
            max-width: 760px;
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .today-photo-image {
            width: 100%;
            display: block;
            cursor: zoom-in;
        }

        .today-photo-info {
            padding: 16px 18px 18px 18px;
        }

        .today-photo-date {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 8px;
        }

        .today-photo-meta {
            color: #555;
            line-height: 1.6;
            word-break: break-word;
        }

        .today-photo-empty {
            color: #999;
            font-size: 0.95rem;
        }

        /* 라이트박스 */
        #todayLightbox {
            display: none;
            position: fixed;
            z-index: 3000;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            flex-direction: column;
        }

        #todayLightbox img {
            max-width: 92vw;
            max-height: 74vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            cursor: zoom-out;
        }

        .today-lightbox-caption {
            margin-top: 16px;
            color: #efefef;
            text-align: center;
            line-height: 1.6;
            max-width: 760px;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .today-photo-title {
                font-size: 1.2rem;
            }

            .today-photo-subtitle {
                font-size: 0.88rem;
            }

            .today-photo-info {
                padding: 14px;
            }

            #todayLightbox img {
                max-width: 94vw;
                max-height: 62vh;
            }

            .today-lightbox-caption {
                font-size: 0.9rem;
                padding: 0 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <img src="images/KakaoTalk_20240406_232152395.jpg" alt="프로필 사진" class="profile-img" id="displayProfileImg" onclick="openProfileEdit()">
            <h2 id="displayName" onclick="openProfileEdit()">Hamihamoo</h2>
            <p id="displayDescription" onclick="openProfileEdit()">Amateur Photographer</p>
            
            <nav>
                <ul>
                    <li><a href="index.html">main page</a></li>
                    <li><a href="digital.html">digital photos</a></li>
                    <li><a href="film.html">film photos</a></li>
                    <li><a href="colors.html">colors archive</a></li>
                    <li><a href="analysis.html">analysis</a></li>
                    <li><a href="guestbook.html">guestbook</a></li>
                </ul>
            </nav>
        </div>

        <div class="main-content">
            <h1>Photo Archive</h1>
            <p>Hi! This is my personal Photo Archive.</p>

            <section class="today-photo-section">
                <h2 class="today-photo-title">Today's Photo</h2>
                <p class="today-photo-subtitle">오늘 하루 동안 고정으로 보여지는 사진이에요.</p>
                <div id="todayPhotoWrap" class="today-photo-empty">사진을 불러오는 중입니다...</div>
            </section>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3>👤 프로필 수정</h3>
            <input type="password" id="profileToken" placeholder="깃허브 토큰 입력">
            
            <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">📸 새 프로필 사진 (선택사항)</label>
            <input type="file" id="profileFile" accept="image/*">
            
            <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">이름</label>
            <input type="text" id="editName" placeholder="이름">
            
            <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">자기소개</label>
            <textarea id="editDescription" rows="3" placeholder="자기소개"></textarea>
            
            <button class="btn-save" onclick="saveProfile()">저장하기</button>
            <button class="btn-cancel" onclick="closeProfileEdit()">취소</button>
            <div id="uploadStatus" style="font-size: 0.8rem; text-align: center; margin-top: 10px; color: blue;"></div>
        </div>
    </div>

    <div id="todayLightbox" onclick="closeTodayLightbox()">
        <img id="todayLightboxImg" src="" alt="오늘의 사진 확대">
        <div class="today-lightbox-caption" id="todayLightboxCaption"></div>
    </div>

    <script>
        const repo = "Helios0513/Photo_Archive.github.io";

        async function loadProfile() {
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/profile.json`);
                if (res.ok) {
                    const data = await res.json();
                    const profile = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    
                    if(profile.profileImage) document.getElementById('displayProfileImg').src = profile.profileImage + "?v=" + Date.now();
                    if(profile.name) document.getElementById('displayName').innerText = profile.name;
                    if(profile.description) document.getElementById('displayDescription').innerText = profile.description;
                    
                    document.getElementById('editName').value = profile.name || "Hamihamoo";
                    document.getElementById('editDescription').value = profile.description || "Amateur Photographer";
                }
            } catch (e) { console.log("기존 프로필 로드 실패"); }
        }

        async function loadTodayPhoto() {
            const wrap = document.getElementById('todayPhotoWrap');

            try {
                const res = await fetch('photos.json');
                const photos = await res.json();

                if (!Array.isArray(photos) || photos.length === 0) {
                    wrap.innerHTML = `<div class="today-photo-empty">표시할 사진이 아직 없어요.</div>`;
                    return;
                }

                // 한국 시간 기준 날짜 생성
                const now = new Date();
                const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

                let seed = 0;
                for (let i = 0; i < todayKey.length; i++) {
                    seed += todayKey.charCodeAt(i);
                }

                const index = seed % photos.length;
                const photo = photos[index];
                const photoDate = photo.date || "날짜 미상";
                const photoInfo = photo.info || "";

                wrap.innerHTML = `
                    <div class="today-photo-card">
                        <img 
                            src="images/digital/${photo.filename}" 
                            alt="Today's Photo" 
                            class="today-photo-image"
                            loading="lazy"
                            onclick="openTodayLightbox('images/digital/${photo.filename}', '${(photoDate + ' | ' + photoInfo).replace(/'/g, "\\'")}')"
                        >
                        <div class="today-photo-info">
                            <div class="today-photo-date">${photoDate}</div>
                            <div class="today-photo-meta">${photoInfo}</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                wrap.innerHTML = `<div class="today-photo-empty">오늘의 사진을 불러오지 못했어요.</div>`;
            }
        }

        function openTodayLightbox(src, caption) {
            const lightbox = document.getElementById('todayLightbox');
            const img = document.getElementById('todayLightboxImg');
            const text = document.getElementById('todayLightboxCaption');

            img.src = src;
            text.innerText = caption;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeTodayLightbox() {
            document.getElementById('todayLightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openProfileEdit() { document.getElementById('profileModal').style.display = 'block'; }
        function closeProfileEdit() { document.getElementById('profileModal').style.display = 'none'; }

        async function saveProfile() {
            const token = document.getElementById('profileToken').value;
            const fileInput = document.getElementById('profileFile');
            const newName = document.getElementById('editName').value;
            const newDesc = document.getElementById('editDescription').value;
            const status = document.getElementById('uploadStatus');

            if (!token) return alert("수정하려면 깃허브 토큰이 필요합니다.");
            status.innerText = "⏳ 처리 중...";

            try {
                let currentImgPath = document.getElementById('displayProfileImg').src.split('?')[0];
                if(currentImgPath.includes('images/')) {
                    currentImgPath = "images/" + currentImgPath.split('images/')[1];
                }

                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const base64 = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    });
                    
                    const fileName = "profile_" + Date.now() + ".jpg";
                    const newPath = "images/" + fileName;

                    await fetch(`https://api.github.com/repos/${repo}/contents/${newPath}`, {
                        method: "PUT",
                        headers: { "Authorization": `token ${token}` },
                        body: JSON.stringify({ message: "Update profile image", content: base64 })
                    });
                    currentImgPath = newPath;
                }

                const profileData = { profileImage: currentImgPath, name: newName, description: newDesc };
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/profile.json`, {
                    headers: { "Authorization": `token ${token}` }
                });
                
                let sha = "";
                if (res.ok) {
                    const existingJson = await res.json();
                    sha = existingJson.sha;
                }

                const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/profile.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}` },
                    body: JSON.stringify({
                        message: "Update profile info",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(profileData, null, 2)))),
                        sha: sha
                    })
                });

                if(putRes.ok) {
                    alert("✅ 프로필이 성공적으로 변경되었습니다!");
                    location.reload();
                } else {
                    throw new Error("JSON 저장 실패");
                }

            } catch (e) {
                alert("❌ 실패: " + e.message);
                status.innerText = "";
            }
        }

        window.onload = () => {
            loadProfile();
            loadTodayPhoto();
        };
    </script>
</body>
</html>
