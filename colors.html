<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colors archive</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body.dark-mode {
            background-color: #111;
            color: #e9e9e9;
        }

        body.dark-mode .container {
            background-color: #181818;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
        }

        body.dark-mode .main-content h1,
        body.dark-mode .main-content p,
        body.dark-mode .color-count,
        body.dark-mode .empty-text {
            color: #e9e9e9;
        }

        .colors-topbar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .topbar-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
        }

        .topbar-btn:hover {
            background: #000;
            transform: translateY(-1px);
        }

        body.dark-mode .topbar-btn {
            background: #f1f1f1;
            color: #111;
        }

        body.dark-mode .topbar-btn:hover {
            background: #ffffff;
        }

        .colors-description {
            max-width: 850px;
            margin-bottom: 26px;
        }

        .color-filter-wrap {
            width: 100%;
            max-width: 980px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .color-filter-btn {
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .color-filter-btn:hover {
            background: #f3f3f3;
        }

        .color-filter-btn.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }

        body.dark-mode .color-filter-btn {
            background: #1f1f1f;
            color: #e9e9e9;
            border-color: #444;
        }

        body.dark-mode .color-filter-btn:hover {
            background: #2a2a2a;
        }

        body.dark-mode .color-filter-btn.active {
            background: #f1f1f1;
            color: #111;
            border-color: #f1f1f1;
        }

        .color-count {
            margin-bottom: 24px;
            color: #666;
            font-size: 0.95rem;
            text-align: center;
        }

        .colors-grid {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }

        .color-photo-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: 0.25s;
        }

        .color-photo-card:hover {
            transform: translateY(-3px);
        }

        body.dark-mode .color-photo-card {
            background: #1b1b1b;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
        }

        .color-photo-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            border-radius: 0;
            box-shadow: none;
        }

        .color-photo-meta {
            padding: 12px;
            text-align: left;
        }

        .color-name-badge {
            display: inline-block;
            font-size: 0.78rem;
            background: #f3f3f3;
            color: #555;
            padding: 5px 10px;
            border-radius: 999px;
            margin-bottom: 10px;
        }

        body.dark-mode .color-name-badge {
            background: #2a2a2a;
            color: #ddd;
        }

        .color-photo-date {
            font-size: 0.82rem;
            color: #999;
            margin-bottom: 6px;
        }

        .color-photo-info {
            font-size: 0.88rem;
            color: #555;
            line-height: 1.5;
            word-break: break-word;
        }

        body.dark-mode .color-photo-info {
            color: #d1d1d1;
        }

        .empty-text {
            width: 100%;
            text-align: center;
            color: #999;
            margin-top: 20px;
        }

        #colorLightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 5000;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #colorLightbox img {
            max-width: 92vw;
            max-height: 72vh;
            object-fit: contain;
            border-radius: 12px;
            cursor: zoom-out;
        }

        .color-lightbox-caption {
            margin-top: 16px;
            color: #f2f2f2;
            text-align: center;
            line-height: 1.6;
            max-width: 850px;
            word-break: break-word;
        }

        @media (max-width: 1024px) {
            .colors-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .colors-topbar {
                justify-content: center;
            }

            .topbar-btn {
                font-size: 0.82rem;
                padding: 8px 13px;
            }

            .colors-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 14px;
            }

            .color-photo-meta {
                padding: 10px;
            }

            .color-photo-info {
                font-size: 0.82rem;
            }

            #colorLightbox img {
                max-width: 94vw;
                max-height: 60vh;
            }

            .color-lightbox-caption {
                font-size: 0.9rem;
                padding: 0 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <img src="images/KakaoTalk_20240406_232152395.jpg" alt="프로필 사진" class="profile-img">
            <h2>Hamihamoo</h2>
            <p>Amateur Photographer</p>

            <nav>
                <ul>
                    <li><a href="index.html">main page</a></li>
                    <li><a href="digital.html">digital photos</a></li>
                    <li><a href="film.html">film photos</a></li>
                    <li><a href="colors.html">colors archive</a></li>
                    <li><a href="analysis.html">analysis</a></li>
                    <li><a href="guestbook.html">guestbook</a></li>
                </ul>
            </nav>
        </div>

        <div class="main-content">
            <div class="colors-topbar">
                <button class="topbar-btn" onclick="toggleDarkMode()">🌙 Dark</button>
            </div>

            <h1>colors archive</h1>
            <p class="colors-description">
                색 기준으로 분류된 사진들을 모아볼 수 있는 페이지예요.
            </p>

            <div id="colorFilterWrap" class="color-filter-wrap"></div>
            <div id="colorCount" class="color-count">사진을 불러오는 중입니다...</div>
            <div id="colorsGrid" class="colors-grid"></div>
        </div>
    </div>

    <div id="colorLightbox" onclick="closeColorLightbox()">
        <img id="colorLightboxImg" src="" alt="확대된 사진">
        <div id="colorLightboxCaption" class="color-lightbox-caption"></div>
    </div>

    <script>
        const COLOR_ORDER = [
            "All",
            "Black",
            "White",
            "Gray",
            "Brown",
            "Red",
            "Orange",
            "Yellow",
            "Green",
            "Blue",
            "Purple",
            "Pink"
        ];

        let allPhotos = [];
        let currentColor = "All";

        applySavedDarkMode();

        function applySavedDarkMode() {
            const savedMode = localStorage.getItem('photo_archive_dark_mode');
            if (savedMode === 'on') {
                document.body.classList.add('dark-mode');
                updateDarkButtonText();
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem(
                'photo_archive_dark_mode',
                document.body.classList.contains('dark-mode') ? 'on' : 'off'
            );
            updateDarkButtonText();
        }

        function updateDarkButtonText() {
            const button = document.querySelector('.topbar-btn');
            if (!button) return;
            button.innerHTML = document.body.classList.contains('dark-mode') ? '☀ Light' : '🌙 Dark';
        }

        function buildColorFilters() {
            const wrap = document.getElementById('colorFilterWrap');
            wrap.innerHTML = '';

            COLOR_ORDER.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-filter-btn';
                if (color === currentColor) btn.classList.add('active');
                btn.innerText = color;
                btn.onclick = () => {
                    currentColor = color;
                    buildColorFilters();
                    renderPhotos();
                };
                wrap.appendChild(btn);
            });
        }

        function getFilteredPhotos() {
            if (currentColor === "All") return allPhotos;
            return allPhotos.filter(photo => (photo.color || "Gray") === currentColor);
        }

        function renderPhotos() {
            const grid = document.getElementById('colorsGrid');
            const count = document.getElementById('colorCount');
            const filtered = getFilteredPhotos();

            grid.innerHTML = '';

            count.innerText = currentColor === "All"
                ? `전체 사진 ${filtered.length}장`
                : `${currentColor} 사진 ${filtered.length}장`;

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-text">해당 색으로 분류된 사진이 아직 없어요.</div>`;
                return;
            }

            filtered.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'color-photo-card';
                card.onclick = () => openColorLightbox(
                    `images/digital/${photo.filename}`,
                    `${photo.date || "날짜 미상"} | ${photo.info || ""}`
                );

                card.innerHTML = `
                    <img 
                        src="images/digital/${photo.filename}" 
                        alt="사진" 
                        class="color-photo-thumb"
                        loading="lazy"
                    >
                    <div class="color-photo-meta">
                        <div class="color-name-badge">${photo.color || "Gray"}</div>
                        <div class="color-photo-date">${photo.date || "날짜 미상"}</div>
                        <div class="color-photo-info">${photo.info || ""}</div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function openColorLightbox(src, caption) {
            const lightbox = document.getElementById('colorLightbox');
            const img = document.getElementById('colorLightboxImg');
            const text = document.getElementById('colorLightboxCaption');

            img.src = src;
            text.innerText = caption;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeColorLightbox() {
            document.getElementById('colorLightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function loadPhotos() {
            try {
                const res = await fetch('photos.json');
                const data = await res.json();

                allPhotos = [...data].sort((a, b) => {
                    const dateA = a.date || "0000-00-00";
                    const dateB = b.date || "0000-00-00";
                    return dateB.localeCompare(dateA);
                });

                buildColorFilters();
                renderPhotos();
            } catch (error) {
                console.error(error);
                document.getElementById('colorCount').innerText = '사진을 불러오지 못했어요.';
            }
        }

        loadPhotos();
    </script>
</body>
</html>
