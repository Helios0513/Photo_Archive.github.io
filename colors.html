<body>
<div class="container">
<div class="profile">

<div class="main-content">
<div class="colors-topbar">
<button class="topbar-btn" onclick="toggleDarkMode()">🌙 Dark</button>
</div>

<h1>colors archive</h1>
<p class="colors-description">색 기준으로 분류된 사진들을 모아볼 수 있는 페이지예요.</p>

<div id="colorFilterWrap" class="color-filter-wrap"></div>
<div id="colorCount" class="color-count">사진을 불러오는 중입니다...</div>
<div id="colorsGrid" class="colors-grid"></div>
</div>
</div>

<div id="colorLightbox" onclick="closeColorLightbox()">
<img id="colorLightboxImg">
<div id="colorLightboxCaption" class="color-lightbox-caption"></div>
</div>

<script>
const COLOR_ORDER = [
"All","Black","White","Gray","Brown","Red","Orange",
"Yellow","Green","Blue","Purple","Pink"
];

// 🔥 핵심 추가
const COLOR_MAP = {
Black:"#111",
White:"#f5f5f5",
Gray:"#888",
Brown:"#8B5A2B",
Red:"#e53935",
Orange:"#fb8c00",
Yellow:"#fdd835",
Green:"#43a047",
Blue:"#1e88e5",
Purple:"#8e24aa",
Pink:"#ec407a"
};

let allPhotos = [];
let currentColor = "All";

function buildColorFilters(){
const wrap = document.getElementById('colorFilterWrap');
wrap.innerHTML='';

COLOR_ORDER.forEach(color=>{
const btn=document.createElement('button');
btn.className='color-filter-btn';

if(color===currentColor) btn.classList.add('active');

btn.innerText=color;

// 🎨 색 적용
if(color!=="All"){
btn.style.background=COLOR_MAP[color]||"#ccc";
btn.style.color=(color==="White"||color==="Yellow")?"#000":"#fff";
btn.style.border="none";
}

btn.onclick=()=>{
currentColor=color;
buildColorFilters();
renderPhotos();
};

wrap.appendChild(btn);
});
}

// 이하 기존 코드 100% 동일
function getFilteredPhotos(){
if(currentColor==="All") return allPhotos;
return allPhotos.filter(p=>(p.color||"Gray")===currentColor);
}

function renderPhotos(){
const grid=document.getElementById('colorsGrid');
const count=document.getElementById('colorCount');
const filtered=getFilteredPhotos();

grid.innerHTML='';

count.innerText=currentColor==="All"
?`전체 사진 ${filtered.length}장`
:`${currentColor} 사진 ${filtered.length}장`;

filtered.forEach(photo=>{
const card=document.createElement('div');
card.className='color-photo-card';

card.onclick=()=>openColorLightbox(
`images/digital/${photo.filename}`,
`${photo.date||"날짜 미상"} | ${photo.info||""}`
);

card.innerHTML=`
<img src="images/digital/${photo.filename}" class="color-photo-thumb">
<div class="color-photo-meta">
<div class="color-name-badge">${photo.color||"Gray"}</div>
<div class="color-photo-date">${photo.date||"날짜 미상"}</div>
<div class="color-photo-info">${photo.info||""}</div>
</div>
`;

grid.appendChild(card);
});
}

function openColorLightbox(src,caption){
const lightbox=document.getElementById('colorLightbox');
const img=document.getElementById('colorLightboxImg');
const text=document.getElementById('colorLightboxCaption');

img.src=src;
text.innerText=caption;
lightbox.style.display='flex';
document.body.style.overflow='hidden';
}

function closeColorLightbox(){
document.getElementById('colorLightbox').style.display='none';
document.body.style.overflow='auto';
}

async function loadPhotos(){
const res=await fetch('photos.json');
const data=await res.json();

allPhotos=[...data];
buildColorFilters();
renderPhotos();
}

loadPhotos();
</script>
</body>
</html>
